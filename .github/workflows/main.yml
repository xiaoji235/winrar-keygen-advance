name: Build and Auto-Release on Push or Manual Trigger
on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and PyInstaller
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") { pip install -r requirements.txt }
          pip install pyinstaller

      - name: Build executable using PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --add-data "winrar-keygen-x64.exe;." `
            --icon=app.ico `
            --name keygen `
            main.py

      - name: Verify keygen.exe exists
        shell: bash
        run: |
          if [ ! -f "dist/keygen.exe" ]; then
            echo "❌ Build failed: dist/keygen.exe not found"
            exit 1
          fi
          echo "✅ keygen.exe built successfully"

      - name: Determine next sequential release version (v1, v2, ...)
        id: get_next_version
        shell: bash
        run: |
          tags=$(gh api repos/${{ github.repository }}/releases --paginate --jq '.[].tag_name')
          max_ver=0
          while IFS= read -r tag; do
            if [[ $tag =~ ^v([0-9]+)$ ]]; then
              num=${BASH_REMATCH[1]}
              (( num > max_ver )) && max_ver=$num
            fi
          done <<< "$tags"
          next_ver=$((max_ver + 1))
          echo "next_tag=v$next_ver" >> $GITHUB_ENV
          echo "release_name=Release v$next_ver" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and Upload keygen.exe only
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.next_tag }}
          name: ${{ env.release_name }}
          body: "Auto-built Windows executable (`keygen.exe`). All required assets are embedded."
          files: dist/keygen.exe
