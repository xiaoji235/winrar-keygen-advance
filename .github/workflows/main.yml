name: Build and Auto-Release on Push or Manual Trigger

on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout repository (read-only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment named 'winrar'
        run: python -m venv winrar

      - name: Activate venv and install dependencies
        shell: bash
        run: |
          source winrar/Scripts/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pyinstaller

      - name: Build executable using PyInstaller as keygen.exe
        shell: bash
        run: |
          source winrar/Scripts/activate
          pyinstaller --onefile --windowed --icon=app.ico --name keygen main.py

      - name: Copy assets/winrar-keygen-x64.exe to dist folder
        shell: bash
        run: |
          if [ -f "assets/winrar-keygen-x64.exe" ]; then
            cp "assets/winrar-keygen-x64.exe" "dist/"
            echo "✅ Copied assets/winrar-keygen-x64.exe to dist/"
          else
            echo "⚠️ Warning: assets/winrar-keygen-x64.exe not found"
          fi

      - name: Locate all required files
        id: find_files
        shell: bash
        run: |
          exe_path="dist/keygen.exe"
          asset_path="dist/winrar-keygen-x64.exe"
          
          if [ ! -f "$exe_path" ]; then
            echo "❌ keygen.exe not found in dist/ directory."
            exit 1
          fi
          
          if [ ! -f "$asset_path" ]; then
            echo "⚠️ Warning: winrar-keygen-x64.exe not found in dist/ directory."
          else
            echo "✅ Found both executables:"
            echo "   - keygen.exe: $exe_path"
            echo "   - winrar-keygen-x64.exe: $asset_path"
          fi
          
          echo "exe_path=$exe_path" >> $GITHUB_ENV
          echo "asset_path=$asset_path" >> $GITHUB_ENV
          echo "exe_name=keygen.exe" >> $GITHUB_ENV
          echo "asset_name=winrar-keygen-x64.exe" >> $GITHUB_ENV

      - name: Determine next sequential release version (v1, v2, ...)
        id: get_next_version
        shell: bash
        run: |
          tags=$(gh api repos/${{ github.repository }}/releases --paginate --jq '.[].tag_name')
          max_ver=0
          while IFS= read -r tag; do
            if [[ $tag =~ ^v([0-9]+)$ ]]; then
              num=${BASH_REMATCH[1]}
              if (( num > max_ver )); then
                max_ver=$num
              fi
            fi
          done <<< "$tags"
          next_ver=$((max_ver + 1))
          echo "next_tag=v$next_ver" >> $GITHUB_ENV
          echo "release_name=Release v$next_ver" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and Upload both executables
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.next_tag }}
          name: ${{ env.release_name }}
          body: The *.exe needs to be downloaded to the same path in order to run!
          files: |
            ${{ env.exe_path }}
            ${{ env.asset_path }}
          draft: false
          prerelease: false
